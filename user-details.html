<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>User Details | CTC Capital Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #020814; color: #e2e8f0; overflow-x: hidden; -webkit-tap-highlight-color: rgba(0,0,0,0); touch-action: manipulation; }
        @media (max-width: 640px) {
            h1 { font-size: 1.5rem; }
            h2 { font-size: 1.25rem; }
            h3 { font-size: 1.1rem; }
            .glass-panel, .max-w-md, .max-w-6xl {
                padding: 1rem !important;
            }
        }
        .glass-panel { background: rgba(15, 23, 42, 0.86); backdrop-filter: blur(18px); border: 1px solid rgba(148, 163, 184, 0.18); }
        .status-pill { border-radius: 9999px; padding: 0.35rem 0.85rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; }
    </style>
</head>
<body class="min-h-screen overflow-x-hidden">
    <div id="adminSidebar"></div>
    <main class="ml-64 px-6 py-8 max-w-7xl">
        <header class="mb-10">
            <p class="text-sm uppercase tracking-[0.35em] text-sky-400">Admin User Detail</p>
            <h1 class="mt-3 text-4xl font-extrabold text-white">User Account Details</h1>
            <p class="max-w-3xl text-slate-400 mt-4">Inspect a single user and update account access or review portfolio holdings.</p>
        </header>

        <section id="detailContainer" class="glass-panel rounded-[2rem] p-8 shadow-2xl shadow-slate-950/40">
            <div id="detailLoading" class="text-slate-400">Loading user details...</div>
        </section>
    </main>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js';
        import { getAuth, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js';
        import { getFirestore, doc, getDoc, collection, getDocs, updateDoc } from 'https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js';

        const firebaseConfig = {
            apiKey: 'AIzaSyAjx0r8OsJAEI8sdTopWadcGYcnD9jcme4',
            authDomain: 'ctc-capital.firebaseapp.com',
            projectId: 'ctc-capital',
            storageBucket: 'ctc-capital.firebasestorage.app',
            messagingSenderId: '563837502113',
            appId: '1:563837502113:web:d84ae0e9d07c997ebb26e0',
            measurementId: 'G-7L643VX04V'
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const detailContainer = document.getElementById('detailContainer');
        const queryString = new URLSearchParams(window.location.search);
        const userId = queryString.get('uid');

        function formatDate(value) {
            if (!value) return 'N/A';
            const date = value.toDate ? value.toDate() : new Date(value);
            return date.toLocaleDateString();
        }

        function formatCurrency(amount) {
            return `$${Number(amount || 0).toFixed(2)}`;
        }

        async function loadUserDetails() {
            // Removed forced redirect to login/index. Page will not redirect if not authenticated.
            // ...existing code...
            try {
                const userDoc = await getDoc(doc(db, 'users', userId));
                if (!userDoc.exists()) {
                    detailContainer.innerHTML = '<p class="text-red-400">User not found.</p>';
                    return;
                }

                const user = { uid: userDoc.id, ...userDoc.data() };
                const portfolioSnapshot = await getDocs(collection(db, 'users', user.uid, 'portfolio'));
                const holdings = [];
                portfolioSnapshot.forEach(item => holdings.push({ id: item.id, ...item.data() }));

                detailContainer.innerHTML = `
                    <div class="grid gap-6 lg:grid-cols-[1.2fr_0.8fr]">
                        <div class="space-y-6">
                            <div class="glass-panel rounded-[2rem] p-6">
                                <div class="flex flex-col gap-4 sm:flex-row sm:items-center sm:justify-between">
                                    <div>
                                        <p class="text-sm uppercase tracking-[0.35em] text-slate-400">User Info</p>
                                        <h2 class="mt-2 text-2xl font-semibold text-white">${user.fullName || 'Unknown User'}</h2>
                                        <p class="text-slate-400">${user.email || 'No email provided'}</p>
                                    </div>
                                    <div>
                                        <span class="status-pill ${user.accountStatus === 'restricted' ? 'bg-red-600 text-white' : 'bg-emerald-600 text-white'}">${user.accountStatus === 'restricted' ? 'Restricted' : 'Active'}</span>
                                    </div>
                                </div>
                                <div class="mt-6 grid gap-4 sm:grid-cols-2">
                                    <div class="rounded-3xl border border-slate-700 bg-slate-950/70 p-5">
                                        <p class="text-sm text-slate-400">USD Balance</p>
                                        <p class="mt-2 text-xl font-semibold text-white">${formatCurrency(user.usdBalance || user.balance)}</p>
                                    </div>
                                    <div class="rounded-3xl border border-slate-700 bg-slate-950/70 p-5">
                                        <p class="text-sm text-slate-400">BTC Balance</p>
                                        <p class="mt-2 text-xl font-semibold text-white">${Number(user.btcBalance || 0).toFixed(8)} BTC</p>
                                    </div>
                                </div>
                                <div class="mt-6 grid gap-4 sm:grid-cols-2">
                                    <div class="rounded-3xl border border-slate-700 bg-slate-950/70 p-5">
                                        <p class="text-sm text-slate-400">KYC Status</p>
                                        <p class="mt-2 text-white">${user.kycStatus || 'Unknown'}</p>
                                    </div>
                                    <div class="rounded-3xl border border-slate-700 bg-slate-950/70 p-5">
                                        <p class="text-sm text-slate-400">Joined</p>
                                        <p class="mt-2 text-white">${formatDate(user.createdAt)}</p>
                                    </div>
                                </div>
                                <div class="mt-6 text-slate-300">
                                    <p><strong>Last login:</strong> ${formatDate(user.lastLoginAt)}</p>
                                    <p class="mt-2"><strong>Last support ticket:</strong> ${user.lastSupportTicket || 'None'}</p>
                                </div>
                            </div>

                            <div class="glass-panel rounded-[2rem] p-6">
                                <div class="flex items-center justify-between gap-4">
                                    <div>
                                        <p class="text-sm uppercase tracking-[0.35em] text-slate-400">Admin actions</p>
                                        <h3 class="mt-2 text-xl font-semibold text-white">Account controls</h3>
                                    </div>
                                    <button id="toggleBlockBtn" class="rounded-3xl px-5 py-3 font-semibold ${user.accountStatus === 'restricted' ? 'bg-emerald-600 text-white hover:bg-emerald-500' : 'bg-red-600 text-white hover:bg-red-500'} transition">${user.accountStatus === 'restricted' ? 'Restore Account' : 'Restrict Account'}</button>
                                </div>
                                <p class="mt-4 text-slate-400">Restricting an account sets the user status to restricted. They will be blocked from logging in and can be restored later.</p>
                            </div>
                        </div>

                        <div class="glass-panel rounded-[2rem] p-6">
                            <h3 class="text-xl font-semibold text-white mb-4">Portfolio Holdings</h3>
                            ${holdings.length ? `
                                <div class="space-y-3">
                                    ${holdings.map(item => `
                                        <div class="rounded-3xl border border-slate-700 bg-slate-950/70 p-4">
                                            <div class="flex items-center justify-between gap-3">
                                                <div>
                                                    <p class="text-sm text-slate-400">${item.symbol}</p>
                                                    <p class="text-lg font-semibold text-white">${item.quantityOwned || 0} shares</p>
                                                </div>
                                                <div class="text-right">
                                                    <p class="text-sm text-slate-400">Value</p>
                                                    <p class="text-lg font-semibold text-white">${formatCurrency((item.quantityOwned || 0) * (item.currentPrice || item.averagePrice || 0))}</p>
                                                </div>
                                            </div>
                                            <div class="mt-3 text-slate-400 text-sm">Average price: ${formatCurrency(item.averagePrice || item.totalInvested / (item.quantityOwned || 1))}</div>
                                        </div>
                                    `).join('')}
                                </div>
                            ` : '<p class="text-slate-400">No portfolio holdings found for this user.</p>'}
                        </div>
                    </div>
                `;

                document.getElementById('toggleBlockBtn').addEventListener('click', () => updateAccountStatus(user.uid, user.accountStatus));
            } catch (error) {
                console.error('Error loading user details:', error);
                detailContainer.innerHTML = '<p class="text-red-400">Unable to load user details.</p>';
            }
        }

        async function updateAccountStatus(uid, currentStatus) {
            const isRestricted = currentStatus === 'restricted';
            const newStatus = isRestricted ? 'active' : 'restricted';
            try {
                await updateDoc(doc(db, 'users', uid), {
                    accountStatus: newStatus,
                    currentNotification: newStatus === 'restricted'
                        ? 'Your account has been restricted by the admin team.'
                        : 'Your account has been restored and is active again.',
                    notificationType: newStatus === 'restricted' ? 'error' : 'success',
                    updatedAt: new Date()
                });
                loadUserDetails();
            } catch (error) {
                console.error('Error updating account status:', error);
                alert('Failed to update account status.');
            }
        }

        onAuthStateChanged(auth, (user) => {
            if (!user) {
                window.location.href = '../public/login.html';
                return;
            }
            loadUserDetails();
        });
    </script>
    <script type="module" src="../components/layout/adminSidebar.js"></script>
</body>
</html>
